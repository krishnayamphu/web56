<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jquery</title>
    <style>
        p{
            padding: 15px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
<button id="btn1">Hide</button>
<button id="btn2">Show</button>
<button id="btn3">Toggle</button>
<p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Commodi dolores error ipsa minus, officiis ratione rem reprehenderit temporibus vel! Commodi dolorem est nemo quia recusandae veniam voluptatem? Aspernatur, debitis reiciendis!</p>
<script src="jquery.min.js"></script>
<script>
    $(function (){
        /*
        $(selector).hide(speed,callback);
        $(selector).show(speed,callback);
        $(selector).toggle(speed,callback);
        */

        //hide paragraph
        $("#btn1").click(function (){
            $("p").hide(1000);
        });

        //show paragraph
        $("#btn2").click(function (){
            $("p").show(1000);
        });
        //toggle paragraph
        $("#btn3").click(function (){
            $("p").toggle(1000);
        });
    });
</script>
</body>
</html>
