<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jquery</title>
    <style>
    .container{
        padding: 15px;
        border: 5px solid red;
        margin: 30px;
    }
    </style>
</head>
<body>
<button id="btn1">remove</button>
<button id="btn2">empty</button>

<div class="container">
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusamus ad atque, autem consectetur deserunt eius et
        eveniet incidunt nemo praesentium recusandae voluptatum. Animi culpa eligendi est fugiat ipsa, quaerat
        ullam.</p>
</div>

<script src="jquery.min.js"></script>
<script>
    $(function () {
        $("#btn1").click(function () {
                $(".container").remove();
            }
        );
        $("#btn2").click(function () {
            $(".container").empty();
            }
        );


    });
</script>
</body>
</html>
