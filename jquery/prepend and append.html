<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jquery</title>
    <style>
        p{
            padding: 15px;
            text-align: center;
            margin: 60px;
            background-color: orangered;
        }
    </style>
</head>
<body>
<button id="btn1">Prepend</button>
<button id="btn2">Append</button>

<p>Sample Text</p>
<script src="jquery.min.js"></script>
<script>
    $(function () {
        $("#btn1").click(function () {
                $("p").prepend("Hey! ");
            }
        );
        $("#btn2").click(function () {
                $("p").append("Hey! ");
            }
        );
    });
</script>
</body>
</html>
