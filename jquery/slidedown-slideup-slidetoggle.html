<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jquery</title>
    <style>
        p {
            padding: 15px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
<button id="btn1">SlideUp</button>
<button id="btn2">SlideDown</button>
<button id="btn3">SlideToggle</button>
<p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Commodi dolores error ipsa minus, officiis ratione rem
    reprehenderit temporibus vel! Commodi dolorem est nemo quia recusandae veniam voluptatem? Aspernatur, debitis
    reiciendis!</p>

<script src="jquery.min.js"></script>
<script>
    $(function () {
        /*
        $(selector).slideUp(speed,callback);
       */

        $("#btn1").click(function () {
            $("p").slideUp(1000);
        });

        $("#btn2").click(function () {
            $("p").slideDown(1000);
        });

        $("#btn3").click(function () {
            $("p").slideToggle(1000);
        });

    });
</script>
</body>
</html>
