<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jquery</title>
    <style>
        .text-green{
            color:darkgreen;
            background-color: black;
            padding: 15px;
        }
    </style>
</head>
<body>
<button id="btn1">Add class</button>
<button id="btn2">Remove class</button>
<button id="btn3">Toggle class</button>

<p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusamus ad atque, autem consectetur deserunt eius et
    eveniet incidunt nemo praesentium recusandae voluptatum. Animi culpa eligendi est fugiat ipsa, quaerat
    ullam.</p>

<script src="jquery.min.js"></script>
<script>
    $(function () {
        $("#btn1").click(function () {
                $("p").addClass("text-green");
            }
        );
        $("#btn2").click(function () {
                $("p").removeClass("text-green");
            }
        );
        $("#btn3").click(function () {
                $("p").toggleClass("text-green");
            }
        );
    });
</script>
</body>
</html>
