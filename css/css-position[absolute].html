<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css</title>
    <style>
        .container{
            margin: 15px auto;
            border: 2px solid orangered;
            height: 150px;
        }
    .box1{
        width: 100px;
        height: 100px;
        background-color: darkred;
        position: absolute;
    }
    .box2{
        width: 100px;
        height: 100px;
        background-color: darkgreen;
        position: absolute;
        top:50px;
        left: 50px;
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>

</body>
</html>
