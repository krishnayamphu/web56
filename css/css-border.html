<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css</title>
    <style>
    div{
        width: 100px;
        height: 100px;
        background-color: aquamarine;
        margin: 5px;
        float: left;
    }

    .box1{ border: 5px solid red; }
    .box2{ border: 5px dashed red; }
    .box3{ border: 5px dotted red; }
    .box4{ border: 5px groove red; }
    .box5{ border: 5px outset red; }
    .box6{ border-left: 5px solid red;}

    .box7{
        width: 0;
        height: 0;
        border-top: 50px solid red;
        border-bottom: 50px solid green;
        border-left: 50px solid blue;
        border-right: 50px solid yellow;
    }

    .box8{
        width: 0;
        height: 0;
        background-color: transparent;
        border-top: 50px solid transparent;
        border-bottom: 50px solid transparent;
        border-left: 50px solid blue;
        border-right: 50px solid transparent;
    }

    </style>
</head>
<body>

<div class="box1">solid</div>
<div class="box2">dashed</div>
<div class="box3">dotted</div>
<div class="box4">groove</div>
<div class="box5">outset</div>
<div class="box6">left border</div>

<div class="box7"></div>
<div class="box8"></div>


</body>
</html>
