<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        .container1{
            width: 200px;
            height: 200px;
            border: 1px solid red;
            margin: 30px;
            perspective: 200px;
            float: left;
        }
        .container1 .box{
            width: 100px;
            height: 100px;
            background: orangered;
            transition: all 1s;
        }
        .container1 .box:hover{
            transform: scaleX(2);
        }

        .container2{
            width: 200px;
            height: 200px;
            border: 1px solid red;
            margin: 30px;
            perspective: 200px;
            float: left;
        }
        .container2 .box{
            width: 100px;
            height: 100px;
            background: orangered;
            transition: all 1s;
        }
        .container2 .box:hover{
            transform: scaleY(2);
        }

        .container3{
            width: 200px;
            height: 200px;
            border: 1px solid red;
            margin: 30px;
            perspective: 200px;
            float: left;
        }
        .container3 .box{
            width: 100px;
            height: 100px;
            background: orangered;
            transition: all 1s;
        }
        .container3 .box:hover{
            transform: scale3d(2,2,2);
        }




    </style>
</head>
<body>

<div class="container1">
    <div class="box">Box</div>
</div>

<div class="container2">
    <div class="box">Box</div>
</div>

<div class="container3">
    <div class="box">Box</div>
</div>
</body>
</html>
