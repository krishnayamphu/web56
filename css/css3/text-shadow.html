<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        h1{
            font-family: Arial;
            margin: 30px;
            float: left;
        }
        .shadow1{
            text-shadow: 2px 2px 5px red;
        }
        .shadow2{
            text-shadow: -1px -1px 0px green;
        }
        .shadow3{
            color:white;
            text-shadow:-1px -1px 0px green,1px 1px 0 red;
        }

    </style>
</head>
<body>
<h1 class="shadow1">TEXT SHADOW</h1>
<h1 class="shadow2">TEXT SHADOW</h1>
<h1 class="shadow3">TEXT SHADOW</h1>


</body>
</html>
