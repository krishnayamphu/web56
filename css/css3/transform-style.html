<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        .container1{
            width: 200px;
            height: 200px;
            border: 1px solid red;
            margin: 30px;
            perspective: 200px;
            float: left;
            padding: 30px;
        }
        .box1{
            width: 100px;
            height: 100px;
            background: orangered;
            transition: all 1s;
            transform: rotateY(45deg);
            position: absolute;
            transform-style: preserve-3d;
        }
        .box2{
            width: 100px;
            height: 100px;
            background: green;
            transition: all 1s;
            transform: rotateY(-45deg);
            position: absolute;
            top: 50px;
        }
    </style>
</head>
<body>

<div class="container1">
    <div class="box1">Box1
        <div class="box2">Box2</div>
    </div>

</div>
</body>
</html>
