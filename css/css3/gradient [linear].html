<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        div {
            width: 200px;
            height: 100px;
            border: 1px solid red;
            margin: 30px;
            float: left;
        }

        .box1 {
            background-image: linear-gradient(red, blue);
        }

        .box2 {
            background-image: -webkit-linear-gradient(left, red, blue);
        }

        .box3 {
            background-image: -webkit-linear-gradient(left top, red, blue);
        }

        .box4 {
            background-image: linear-gradient(55deg, red, blue);
        }

        .box5 {
            background-image: -webkit-linear-gradient(left, red, blue, yellow, green, orange);
        }
        .box6 {
            background-image: -webkit-linear-gradient(left, red, blue 10%, yellow 20%, green 20%);
        }
        .box7 {
            background-image: -webkit-repeating-linear-gradient(left, red, blue 25%);
        }
    </style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>
<div class="box6"></div>
<div class="box7"></div>
</body>
</html>
