<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        div{
            float: left;
            margin: 15px;
        }
        .box1{
            width: 100px;
            height: 100px;
            background: green;
            transition-property: background-color;
            transition-duration: 1s;
            transition-timing-function: ease;
            transition-delay: 0s;
        }
        .box1:hover{
            background-color: red;
        }

        .box2{
            width: 100px;
            height: 100px;
            background: green;
            border: 5px solid blue;
            -webkit-transition:all 1s;
            -moz-transition:all 1s;
            transition:all 1s;
        }
        .box2:hover{
            border-radius: 50%;
            background-color: red;
        }
    </style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
</body>
</html>
