<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        div {
            width: 200px;
            height: 100px;
            border: 1px solid red;
            margin: 30px;
            float: left;
        }

        .box1 {
            background-image: conic-gradient(red, blue);
        }

        .box2 {
            background-image:conic-gradient(red, blue,orangered,green);
        }

        .box3 {
            background-image: conic-gradient(from 90deg,red, blue,green);
        }
        .box4{
            background-image:conic-gradient(at 50% 45%, red, yellow, green);
        }
    </style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>

</body>
</html>
