<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: #1abc9c;
            float: left;
            margin: 30px;
        }
        .box2{
            padding: 10px;
        }
        .box3{
            padding: 10px;
            border: 10px solid red;
        }
        .box4{
            padding: 10px;
            border: 10px solid red;
            box-sizing: border-box;
        }

    </style>
</head>
<body>


<div class="box1">box1</div>
<div class="box2">box2</div>
<div class="box3">box3</div>
<div class="box4">box4</div>
</body>
</html>
