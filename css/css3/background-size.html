<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        div{
            float: left;
            margin: 15px;
        }
        .box1{
            width: 400px;
            height: 300px;
             border: 2px solid red;
            background: url('pic.jpg') no-repeat blue;
            background-size: cover;           
        }

        .box2{
            width: 400px;
            height: 300px;
             border: 2px solid red;
            background: url('newyear.jpg') no-repeat blue;
            background-size: contain;           
        }

        .box3{
            width: 400px;
            height: 300px;
             border: 2px solid red;
            background: url('newyear.jpg') no-repeat blue;
            background-size: 100% 100%;           
        }

      
    </style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
</body>
</html>
