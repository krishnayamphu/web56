<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        div {
            width: 200px;
            height: 100px;
            border: 1px solid red;
            margin: 30px;
            float: left;
        }

        .box1 {
            background-image: radial-gradient(red, blue);
        }

        .box2 {
            background-image: -webkit-radial-gradient(circle, red, blue);
        }

        .box3 {
            background-image: -webkit-radial-gradient(red, blue,green);
        }

        .box4 {
            background-image: radial-gradient(circle,red, blue 10%, orangered 90%);
        }

        .box5 {
            background-image: repeating-radial-gradient(circle, red, blue, yellow, green, orange);
        }

    </style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>

</body>
</html>
