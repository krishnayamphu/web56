<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            border: 2px solid red;
            margin: 15px;
            float: left;
        }
        .box1{
            -webkit-border-radius: 10px;
            -moz-border-radius: 10px;
            border-radius: 10px;
        }
        .box2{
            border-radius: 50px 0px 0px 0px;
        }
        .box3{
            border-radius: 50%;
        }
        .box4{
            border-radius: 0 30px 0 30px;
        }
        .box5{
            border-radius: 50px 50px 50px 0;
        }
        .pic1{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 10px solid orangered;
        }
    </style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>

<img src="pic.jpg" alt="" class="pic1">

</body>
</html>
