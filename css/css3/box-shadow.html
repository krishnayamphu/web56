<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 30px;
            float: left;
        }
        .box1{
            box-shadow: 10px 10px 10px black;
        }
        .box2{
            box-shadow: -10px -10px 2px black;
        }
        .box3{
            box-shadow: 0px 0px 6px 6px black;
        }
        .box4{
            background-color: white;
            box-shadow:inset 0px 0px 10px 5px black;
        }
        .box5{
            box-shadow:5px 5px 5px blue,-5px -5px 5px green;
        }

        img{
            width: 100px;
            box-shadow: 0px 0px 3px black;
        }
        img:hover{
            box-shadow: 0px 0px 3px 3px black;
        }

    </style>
</head>
<body>
<div class="box1">Box</div>
<div class="box2">Box</div>
<div class="box3">Box</div>
<div class="box4">Box</div>
<div class="box5">Box</div>

<img src="pic.jpg" alt="pic">
</body>
</html>
