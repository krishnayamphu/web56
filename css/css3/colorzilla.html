<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        div {
            width: 200px;
            height: 100px;
            border: 1px solid red;
            margin: 30px;
            float: left;
        }

        .box1 {
            background: rgb(240,183,161);
            background: -moz-linear-gradient(-45deg,  rgba(240,183,161,1) 0%, rgba(140,51,16,1) 50%, rgba(117,34,1,1) 51%, rgba(191,110,78,1) 100%);
            background: -webkit-linear-gradient(-45deg,  rgba(240,183,161,1) 0%,rgba(140,51,16,1) 50%,rgba(117,34,1,1) 51%,rgba(191,110,78,1) 100%);
            background: linear-gradient(135deg,  rgba(240,183,161,1) 0%,rgba(140,51,16,1) 50%,rgba(117,34,1,1) 51%,rgba(191,110,78,1) 100%);
            filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#f0b7a1', endColorstr='#bf6e4e',GradientType=1 );

        }

        .box2 {
            background: rgb(248,80,50);
            background: -moz-linear-gradient(top,  rgba(248,80,50,1) 0%, rgba(241,111,92,1) 50%, rgba(246,41,12,1) 51%, rgba(240,47,23,1) 71%, rgba(231,56,39,1) 100%);
            background: -webkit-linear-gradient(top,  rgba(248,80,50,1) 0%,rgba(241,111,92,1) 50%,rgba(246,41,12,1) 51%,rgba(240,47,23,1) 71%,rgba(231,56,39,1) 100%);
            background: linear-gradient(to bottom,  rgba(248,80,50,1) 0%,rgba(241,111,92,1) 50%,rgba(246,41,12,1) 51%,rgba(240,47,23,1) 71%,rgba(231,56,39,1) 100%);
            filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#f85032', endColorstr='#e73827',GradientType=0 );

        }

        .box3 {
            background: rgb(15,73,22);
            background: -moz-linear-gradient(top,  rgba(15,73,22,1) 0%, rgba(49,107,41,1) 53%, rgba(15,29,89,1) 100%);
            background: -webkit-linear-gradient(top,  rgba(15,73,22,1) 0%,rgba(49,107,41,1) 53%,rgba(15,29,89,1) 100%);
            background: linear-gradient(to bottom,  rgba(15,73,22,1) 0%,rgba(49,107,41,1) 53%,rgba(15,29,89,1) 100%);
            filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#0f4916', endColorstr='#0f1d59',GradientType=0 );

        }

    </style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>

</body>
</html>
