<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        .box1>img{
            width: 100px;
            height: 100px;
            border: 1px solid green;
            margin: 60px auto;
            display: block;
            opacity: 0.8;
            transition: all 1s;
        }
        .box1>img:hover{
            transform: scale(1.5);
            opacity: 1;
        }

        .box2{
            width: 100px;
            height: 100px;
            border: 1px solid green;
            margin: 60px auto;
            display: block;
            overflow: hidden;
        }
        .box2>img{
            opacity: 0.8;
            transition: all 1s;
            width: 100%;
        }
        .box2 img:hover{
            transform: scale(1.5);
            opacity: 1;
        }


    </style>
</head>
<body>

<div class="box1">
    <img src="pic.jpg" alt="pic">

    <div class="box2">
        <img src="pic.jpg" alt="pic">
    </div>

</body>
</html>
