<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        .thumbnail1{
            width: 200px;
            height: 250px;
            border: 10px solid green;
            object-fit: contain;
        }
        .thumbnail2{
            width: 200px;
            height: 250px;
            border: 10px solid green;
            object-fit: contain;
            object-position: top;
        }
        .thumbnail3{
            width: 200px;
            height: 250px;
            border: 10px solid green;
            object-fit: contain;
            object-position: bottom;
        }
        .thumbnail4{
            width: 200px;
            height: 250px;
            border: 10px solid green;
            object-fit: contain;
            object-position: 10px 10px;
        }
    </style>
</head>
<body>

<img class="thumbnail1" src="newyear.jpg" alt="">
<img class="thumbnail2" src="newyear.jpg" alt="">
<img class="thumbnail3" src="newyear.jpg" alt="">
<img class="thumbnail4" src="newyear.jpg" alt="">

</body>
</html>
