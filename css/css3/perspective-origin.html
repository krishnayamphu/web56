<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css3</title>
    <style>
        .container1 {
            width: 200px;
            height: 200px;
            border: 1px solid red;
            margin: 30px auto;
            padding: 30px;
            perspective: 100px;
            perspective-origin: 170% 40%;
        }

        .box{
            width: 100px;
            height: 100px;
            background: orangered;
            transition: all 1s;
            transform: rotateX(30deg);
            position: absolute;
        }
    </style>
</head>
<body>

<div class="container1">
    <div class="box">Box</div>
</div>
</body>
</html>
