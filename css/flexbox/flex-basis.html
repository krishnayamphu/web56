<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Box</title>
    <style>
        .container{
            border: 1px solid red;
            margin-bottom: 15px;
            display: flex;
        }

        .item{
            background-color: #1abc9c;
        }
        .item:nth-child(even){
            background-color: orange;
        }
        .flex-basis-100{
            flex-basis: 100px;
        }



    </style>
</head>
<body>

<div class="container">
    <div class="item flex-basis-100">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>

</body>
</html>
