<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Box</title>
    <style>
        .container{
            border: 1px solid red;
            /*padding: 15px;*/
            margin-bottom: 15px;
            display: flex;
            height: 150px;
        }

        .item{
            background-color: #1abc9c;
        }
        .item:nth-child(even){
            background-color: orange;
            padding: 10px 0;
        }
        .item:last-child{
            padding: 30px 0;
        }

        .align-item-stretch{
            align-items: stretch;
        }

        .align-item-center{
            align-items: center;
        }
        .align-item-flext-start{
            align-items: flex-start;
        }

        .align-item-flext-end{
            align-items: flex-end;
        }
        .align-item-baseline{
            align-items: baseline;
        }



    </style>
</head>
<body>

<div class="container align-item-stretch">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>

<div class="container align-item-center">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>

<div class="container align-item-flext-start">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>

<div class="container align-item-flext-end">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>

<div class="container align-item-baseline">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>

</body>
</html>
