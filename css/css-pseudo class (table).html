<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css</title>
    <style>
    table{
        border-collapse: collapse;

    }
    th,td{
        width: 100px;
        border: 1px solid green;
        padding: 10px;
    }
    tr:nth-child(even){
        background-color: #ccc;
    }
    tr:nth-child(odd){
        background-color: gray;
    }
    tr:hover{
        background-color: rgba(0,0,0,0.6);
        color:white;
    }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Address</th>
        </tr>
        <tr>
            <td>Ram</td>
            <td>Ktm</td>
        </tr>
        <tr>
            <td>Hari</td>
            <td>Lalitpur</td>
        </tr>
        <tr>
            <td>Sita</td>
            <td>Dharan</td>
        </tr>
    </table>
</body>
</html>
