<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css</title>
    <style>
        a:link{
            color:green;
            text-decoration: none;
        }
        a:visited{
            color:orangered;
        }
        a:hover{
            color:blue;
            text-decoration: underline;
            background-color: black;
        }
        a:active{
            color:yellow;
        }
    </style>
</head>
<body>

<a href="#1">Link 1</a>
<a href="#2">Link 2</a>
<a href="#3">Link 3</a>
<a href="#4">Link 4</a>



</body>
</html>
