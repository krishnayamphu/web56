<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css</title>
    <style>
        .box1{
            width: calc(100% - 300px);
            height: 100px;
            background-color: #1abc9c;
            margin: 15px auto;
        }
        .box2{
            width: max(100%, 600px);
            height: 100px;
            background-color: #2c3e50;
        }
    </style>
</head>
<body>
<div class="box1"></div>
<div class="box2"></div>
</body>
</html>
