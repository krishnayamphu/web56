<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>form</title>
</head>
<body>

<form action="#">
    <label>Username:</label>
    <input type="text" value="" placeholder="username" required>
    <br><br>

    <label>Password:</label>
    <input type="password" placeholder="password">
    <br><br>

    <label>Number:</label>
    <input type="number" value="100" readonly>
    <br><br>

    <label>Checkbox:</label>
    <input type="checkbox" value="basic" checked>Basic
    <input type="checkbox" value="photoshop">Photoshop
    <br><br>

    <label>Radio Button:</label>
    <input type="radio" name="gender" value="male" checked>Male
    <input type="radio" name="gender" value="female">Female
    <br><br>

    <label>Email</label>
    <input type="email" placeholder="email">
    <br><br>

    <label>Search</label>
    <input type="search" placeholder="search">
    <br><br>

    <label>Date</label>
    <input type="date">
    <br><br>

    <label>Time</label>
    <input type="time">
    <br><br>

    <label for="my-datetime">Datetime Local</label>
    <input type="datetime-local" id="my-datetime">
    <br><br>

    <label>Range</label>
    <input type="range" min="0"  max="100" value="50">
    <br><br>

    <label>Color</label>
    <input type="color">
    <br><br>

    <label>File</label>
    <input type="file">
    <br><br>

    <label>Telephone</label>
    <input type="tel" value="5451212">
    <br><br>

    <label>Select</label>
    <select name="country">
        <option value="nepal">Nepal</option>
        <option value="china">China</option>
        <option value="india" selected>India</option>
        <option value="japan">Japan</option>
        <option value="korea">Korea</option>
    </select>
    <br><br>

    <label>Textarea</label>
    <textarea name="" cols="30" rows="10"></textarea>
    <br><br>



    <button type="submit">Submit</button>
    <input type="reset" value="reset">
</form>
</body>
</html>
