<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>html</title>
	<style>
	table{
		border-collapse: collapse;
		margin: 15px;
	}
	th,td{
		border: 1px solid red;
	}

	.bg-green{
		background-color: green;
	}
	.my-custom-table{
		background-color: aquamarine;
		width: 300px;
		margin: 15px auto;
	}
	.my-custom-table th,td{
		border: 1px solid #222;
		padding: 10px;
	}
	.my-custom-table th{
		background-color: #333;
		color:white;
	}
	.my-custom-table td{
		text-align: center;
	}
	.my-table-border th, .my-table-border td{
		border: 1px dashed green;
		padding: 10px;
	}

	</style>
</head>
<body>
<table>
	<tr>
		<th>SN</th>
		<th>Name</th>
		<th>Address</th>
	</tr>
	<tr>
		<td>1</td>
		<td>Ram</td>
		<td>Ktm</td>
	</tr>
</table>

<table class="bg-green">
	<tr>
		<th>SN</th>
		<th>Name</th>
		<th>Address</th>
	</tr>
	<tr>
		<td>1</td>
		<td>Ram</td>
		<td>Ktm</td>
	</tr>
</table>

<table class="my-custom-table">
	<tr>
		<th>SN</th>
		<th>Name</th>
		<th>Address</th>
	</tr>
	<tr>
		<td>1</td>
		<td>Ram</td>
		<td>Ktm</td>
	</tr>
</table>

<table class="my-table-border">
	<tr>
		<th>SN</th>
		<th>Name</th>
		<th>Address</th>
	</tr>
	<tr>
		<td>1</td>
		<td>Ram</td>
		<td>Ktm</td>
	</tr>
</table>

</body>
</html>
