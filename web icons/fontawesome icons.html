<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Icons</title>
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <style>
    .social{
        border: 1px solid red;
        padding: 15px;
    }
    .social a{
        display: inline-block;
        padding: 5px 15px;
        color:darkblue;
        font-size: 40px;
    }
    </style>
</head>
<body>

<i class="fa fa-home" aria-hidden="true"></i>
<i class="fa fa-camera"></i>
<i class="fa fa-building"></i>
<hr>

<i class="fa fa-camera-retro fa-lg"></i> fa-lg <br>
<i class="fa fa-camera-retro fa-2x"></i> fa-2x <br>
<i class="fa fa-camera-retro fa-3x"></i> fa-3x <br>
<i class="fa fa-camera-retro fa-4x"></i> fa-4x <br>
<i class="fa fa-camera-retro fa-5x"></i> fa-5x <br>
<hr>
<h3>List Icons</h3>
<ul class="fa-ul">
    <li><i class="fa-li fa fa-check-square"></i>List icons</li>
    <li><i class="fa-li fa fa-check-square"></i>can be used</li>
    <li><i class="fa-li fa fa-spinner fa-spin"></i>as bullets</li>
    <li><i class="fa-li fa fa-square"></i>in lists</li>
</ul>

<h3>Animated Icons</h3>
<i class="fa fa-spinner fa-spin fa-3x fa-fw"></i>
<span class="sr-only">Loading...</span>

<i class="fa fa-circle-o-notch fa-spin fa-3x fa-fw"></i>
<span class="sr-only">Loading...</span>

<i class="fa fa-refresh fa-spin fa-3x fa-fw"></i>
<span class="sr-only">Loading...</span>

<i class="fa fa-cog fa-spin fa-3x fa-fw"></i>
<span class="sr-only">Loading...</span>

<i class="fa fa-spinner fa-pulse fa-3x fa-fw"></i>
<span class="sr-only">Loading...</span>

<h3>Rotated & Flipped</h3>
<i class="fa fa-shield"></i> normal<br>
<i class="fa fa-shield fa-rotate-90"></i> fa-rotate-90<br>
<i class="fa fa-shield fa-rotate-180"></i> fa-rotate-180<br>
<i class="fa fa-shield fa-rotate-270"></i> fa-rotate-270<br>
<i class="fa fa-shield fa-flip-horizontal"></i> fa-flip-horizontal<br>
<i class="fa fa-shield fa-flip-vertical"></i> fa-flip-vertical

<hr>

<form action="">
    <label><i class="fa fa-envelope"></i> Email</label>
    <input type="email" placeholder="example@xyz.com">
    <button><i class="fa fa-send"></i> Send</button>
</form>

<h3>Social Icons</h3>
<div class="social">
    <a href="#!"><i class="fa fa-facebook"></i></a>
    <a href="#!"><i class="fa fa-twitter"></i></a>
    <a href="#!"><i class="fa fa-instagram"></i></a>
    <a href="#!"><i class="fa fa-youtube-play"></i></a>
</div>


</body>
</html>
