<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript</title>
</head>
<body>
<script>

    let time=new Date();
    let y=time.getFullYear();
    let mo=time.getMonth()+1;
    let date=time.getDate();
    let day=time.getDay()+1;

    let h=time.getHours();
    if(h>=12){
        h=h-12;
    }
    let m=time.getMinutes();
    let s=time.getSeconds();
    let ms=time.getMilliseconds();

    document.write(y+"-"+mo+"-"+date+", "+day);

    document.write("<br>"+h+":"+m+":"+s+":"+ms);



</script>


</body>
</html>
