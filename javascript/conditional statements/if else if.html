<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript</title>
</head>
<body>
<script>
let p=parseFloat(prompt("Percentage",""));

if(p>=80){
   document.write("Distinction");
}else if(p>=60){
    document.write("First");
}else if(p>=45){
    document.write("Second");
}else if(p>=35){
    document.write("Third");
}else{
    document.write("Fail");
}

</script>
</body>
</html>
