<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nav</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial;
        }
        nav{
            background-color: darkgreen;
            width: 900px;
            margin: 0 auto;
            overflow: hidden;
        }
        .brand{
            float: left;
            text-decoration: none;
        }
        .brand img{
            width: 40px;
        }
        .nav-list{
            float: right;
        }
        .nav-list a{
            color:white;
            text-decoration: none;
            padding: 13px 20px;
            display: inline-block;
            text-align: center;
        }
        nav a:hover{
            background-color: orangered;
        }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="#!"><img src="haha.gif" alt="logo"></a>
    <div class="nav-list">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Product</a>
        <a href="#">Contact</a>
    </div>

</nav>
</body>
</html>
