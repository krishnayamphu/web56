<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nav</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial;
        }
        body{
            background-image: url("newyear.jpg");
        }

        nav {
            background-color: darkgreen;
            width: 900px;
            margin: 0 auto;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            display: inline-block;
            position: relative;
        }

        nav ul li a {
            text-decoration: none;
            display: inline-block;
            padding: 10px 30px;
            color: white;
        }

        nav ul li a:hover {
            background-color: orangered;
            color: white;
        }

        nav ul ul {
            position: absolute;
            background-color: rgba(0,100,0,0.7);
            width: 200px;
            display: none;
            left: -30%;
        }

        nav ul ul li {
            width: 100%;
        }

        nav ul ul a {
            display: block;
            text-align: center;
        }

        nav ul li:hover ul {
            display: block;
        }
    </style>
</head>
<body>
<nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a>
            <ul>
                <li><a href="#">Services 1</a></li>
                <li><a href="#">Services 2</a></li>
                <li><a href="#">Services 3</a></li>
            </ul>
        </li>
        <li><a href="#">About</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>
</body>
</html>
