<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nav</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial;
        }
        nav{
            background-color: darkgreen;
            width: 900px;
            margin: 0 auto;
        }
        nav a{
            color:white;
            text-decoration: none;
            padding: 10px 20px;
            display: inline-block;
            text-align: center;
        }
        nav a:hover{
            background-color: orangered;
        }
    </style>
</head>
<body>
<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Product</a>
    <a href="#">Contact</a>
</nav>
</body>
</html>
